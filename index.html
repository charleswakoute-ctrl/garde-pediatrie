<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compte rendu — Garde Pédiatrie</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <style>
    :root {
      --primary: #1f7a5a;
      --primary-dark: #145c44;
      --light: #f4fbf7;
      --white: #ffffff;
      --gray: #6c7a89;
      --border: #dbeee5;
      --danger: #e74c3c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--light);
      color: #1a2e2a;
    }

    header {
      background: var(--primary-dark);
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 600;
      font-size: 1.1rem;
    }

    main {
      max-width: 1000px;
      margin: auto;
      padding: 25px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 5px;
    }

    .subtitle {
      color: var(--gray);
      margin-bottom: 25px;
    }

    .card {
      background: var(--white);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 15px;
      text-transform: uppercase;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 0.75rem;
      color: var(--gray);
      margin-bottom: 5px;
    }

    input,
    textarea {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #f9fffb;
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .coherence {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      background: #eefaf4;
    }

    .ok {
      color: green;
    }

    .err {
      color: var(--danger);
    }

    .submit-zone {
      text-align: right;
    }

    .btn {
      background: var(--primary);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: var(--primary-dark);
    }

    @media(max-width:700px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Service Pédiatrie</div>
  </header>
  <main>
    <h1>Compte rendu de garde</h1>
    <p class="subtitle">Saisie rapide et export PDF</p>

    <div class="card">
      <div class="section-title">Informations générales</div>
      <div class="field"><label>Date de garde</label><input type="date" id="date"></div>
    </div>

    <div class="card">
      <div class="section-title">Admissions</div>
      <div class="grid-2">
        <div class="field"><label>Total admissions</label><input type="number" id="total_admission" min="0"
            placeholder="0" oninput="check()"></div>
        <div class="field"><label>Total cas hospitalisés</label><input type="number" id="total_hospitalisation" min="0"
            placeholder="0" oninput="check()"></div>
        <div class="field"><label>Total cas traités en ambulatoire</label><input type="number" id="cas_ambulatoire"
            min="0" placeholder="0" oninput="check()"></div>
        <div class="field"><label>Total cas référés</label><input type="number" id="cas_referes" min="0" placeholder="0"
            oninput="check()"></div>
        <div class="field"><label>Total décès avant admission</label><input type="number" id="deces_avant" min="0"
            placeholder="0"></div>
        <div class="field"><label>Total décès au cours de la garde</label><input type="number" id="deces_apres" min="0"
            placeholder="0"></div>
      </div>
      <div id="coherence" class="coherence">Vérification en cours...</div>
    </div>

    <div class="card">
      <div class="section-title">Répartition par secteur</div>
      <div class="grid-2">
        <div class="field"><label>Total secteur urgences</label><input type="number" id="secteur_urgence" min="0"
            placeholder="0"></div>
        <div class="field"><label>Total secteur hospitalisation</label><input type="number" id="secteur_hospitalisation"
            min="0" placeholder="0"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">Observations médicales</div>
      <div class="field" style="margin-bottom: 15px;">
        <label>Panorama des cas hospitalisés</label>
        <textarea id="panorama" placeholder="Décrivez les cas notables..."></textarea>
      </div>
      <div class="field">
        <label>Incidents au cours de la garde</label>
        <textarea id="incident" placeholder="Aucun incident / décrire si nécessaire..."></textarea>
      </div>
    </div>

    <div class="submit-zone">
      <button class="btn" onclick="genererPDF()">Exporter rapport</button>
    </div>
  </main>

    function val(id) { return parseInt(document.getElementById(id).value || 0); }
    function txt(id) { return document.getElementById(id).value.trim() || "—"; }

    function check() {
      let t = val("total_admission"), h = val("total_hospitalisation"), a = val("cas_ambulatoire"), r = val("cas_referes");
      let c = document.getElementById("coherence");
      if (t === 0 && h === 0 && a === 0 && r === 0) { c.innerHTML = "Vérification en cours..."; c.className = "coherence"; return; }
      if (t === h + a + r) { c.innerHTML = "✓ Données cohérentes — " + t + " = " + h + " + " + a + " + " + r; c.className = "coherence ok"; }
      else { c.innerHTML = "✗ Incohérence — " + t + " ≠ " + h + " + " + a + " + " + r + " (= " + (h + a + r) + ")"; c.className = "coherence err"; }
    }

    function genererPDF() {
      let t = val("total_admission"), h = val("total_hospitalisation"), a = val("cas_ambulatoire"), r = val("cas_referes");
      if (t !== h + a + r) { alert("Corrigez l'incohérence avant d'exporter !"); return; }

      const dateVal = document.getElementById("date").value;
      const dateFormatee = dateVal ? dateVal.split("-").reverse().join("/") : "Non renseignée";

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

      const GD = [20, 92, 68], GL = [238, 250, 244], GM = [31, 122, 90], W = [255, 255, 255], GR = [108, 122, 137];
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight(); // 297mm

      // ── Logo hôpital ──
      const logoDataUrl = "data:image/png;base64," + LOGO_B64;
      const imgProps = doc.getImageProperties(logoDataUrl);
      const logoW = pageW - 28;
      const logoH = (imgProps.height * logoW) / imgProps.width;
      doc.addImage(logoDataUrl, "PNG", 14, 6, logoW, logoH);

      let y = logoH + 10;

      // Ligne + bandeau service
      doc.setDrawColor(...GM);
      doc.setLineWidth(0.5);
      doc.line(14, y, pageW - 14, y);
      y += 2;
      doc.setFillColor(...GD);
      doc.rect(0, y, pageW, 8, "F");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10);
      doc.setTextColor(...W);
      doc.text("Service Pédiatrie", pageW / 2, y + 5.5, { align: "center" });
      y += 11;

      // Ligne + bandeau service
      doc.setDrawColor(...GM);
      doc.setLineWidth(0.5);
      doc.line(14, y, pageW - 14, y);
      y += 2;
      doc.setFillColor(...GD);
      doc.rect(0, y, pageW, 8, "F");
      doc.setFont("helvetica", "bold");
      doc.setFontSize(12);
      doc.setTextColor(...W);
      doc.text("COMPTE RENDU DE GARDE", pageW / 2, y + 5.5, { align: "center" });
      y += 11;

      // Date
      doc.setFont("helvetica", "normal");
      doc.setFontSize(9);
      doc.setTextColor(...GR);
      doc.text("Date de garde : " + dateFormatee, 14, y);
      y += 4;
      doc.setDrawColor(...GM);
      doc.setLineWidth(0.3);
      doc.line(14, y, pageW - 14, y);
      y += 5;

      // Espace restant (réservé 10mm pour pied de page)
      const bottomMargin = 12;
      const available = pageH - y - bottomMargin;

      // On divise l'espace en 3 blocs verticaux :
      // Bloc 1 (admissions + secteurs côte à côte) : ~55% de l'espace
      // Bloc 2 (observations) : ~45% de l'espace
      const bloc1H = available * 0.52;
      const bloc2H = available * 0.42;

      const colLeft = 14;
      const colMid = pageW / 2 + 2;
      const colW1 = pageW / 2 - 16;  // largeur colonne gauche
      const colW2 = pageW / 2 - 16;  // largeur colonne droite

      // ════ LIGNE 1 : Admissions (gauche) | Secteurs (droite) ════

      function miniTitle(label, x, yPos, w) {
        doc.setFillColor(...GL);
        doc.roundedRect(x, yPos - 4, w, 6, 1, 1, "F");
        doc.setFont("helvetica", "bold");
        doc.setFontSize(7);
        doc.setTextColor(...GM);
        doc.text(label.toUpperCase(), x + 3, yPos);
        return yPos + 4;
      }

      // -- Admissions (colonne gauche) --
      let yL = miniTitle("Admissions", colLeft, y, colW1);
      doc.autoTable({
        startY: yL,
        margin: { left: colLeft, right: pageW - colLeft - colW1 },
        tableWidth: colW1,
        head: [["Indicateur", "Val."]],
        body: [
          ["Total admissions", t],
          ["Total cas hospitalisés", h],
          ["Total cas traités en ambulatoire", a],
          ["Total référés", r],
          ["Total décès avant admission", val("deces_avant")],
          ["Total décès au cours de la garde", val("deces_apres")],
        ],
        styles: { font: "helvetica", fontSize: 10, cellPadding: 2, textColor: [26, 46, 42] },
        headStyles: { fillColor: GM, textColor: W, fontStyle: "bold", halign: "center", fontSize: 10 },
        columnStyles: { 0: { cellWidth: "auto" }, 1: { halign: "center", fontStyle: "bold", cellWidth: 14 } },
        alternateRowStyles: { fillColor: [244, 251, 247] },
        theme: "grid",
      });
      let yAfterLeft = doc.lastAutoTable.finalY;

      // -- Secteurs (colonne droite) --
      let yR = miniTitle("Répartition par secteur", colMid, y, colW2);
      doc.autoTable({
        startY: yR,
        margin: { left: colMid, right: 14 },
        tableWidth: colW2,
        head: [["Secteur", "Patients"]],
        body: [
          ["Total cas secteur srgences", val("secteur_urgence")],
          ["Total cas secteur hospitalisation", val("secteur_hospitalisation")],
        ],
        styles: { font: "helvetica", fontSize: 10, cellPadding: 2, textColor: [26, 46, 42] },
        headStyles: { fillColor: GM, textColor: W, fontStyle: "bold", halign: "center", fontSize: 10 },
        columnStyles: { 0: { cellWidth: "auto" }, 1: { halign: "center", fontStyle: "bold", cellWidth: 20 } },
        alternateRowStyles: { fillColor: [244, 251, 247] },
        theme: "grid",
      });
      let yAfterRight = doc.lastAutoTable.finalY;

      y = Math.max(yAfterLeft, yAfterRight) + 5;

      // ════ LIGNE 2 : Observations (pleine largeur) ════
      let yObs = miniTitle("Observations au cours de la garde", colLeft, y, pageW - 28);

      // Hauteur restante pour les observations
      const obsH = pageH - yObs - bottomMargin - 4;

      doc.autoTable({
        startY: yObs,
        margin: { left: 14, right: 14 },
        head: [["Rubrique", "Contenu"]],
        body: [
          ["Panorama des cas hospitalisés", txt("panorama")],
          ["Incidents au cours de la garde", txt("incident")],
        ],
        styles: { font: "helvetica", fontSize: 10, cellPadding: 3, textColor: [26, 46, 42], overflow: "linebreak" },
        headStyles: { fillColor: GM, textColor: W, fontStyle: "bold", halign: "center", fontSize: 10 },
        columnStyles: { 0: { cellWidth: 48, fontStyle: "bold" }, 1: { cellWidth: "auto" } },
        alternateRowStyles: { fillColor: [244, 251, 247] },
        theme: "grid",
        // Forcer la hauteur minimale des lignes pour occuper l'espace
        rowPageBreak: "avoid",
      });

      // ── Pied de page ──
      doc.setFillColor(...GD);
      doc.rect(0, pageH - 10, pageW, 10, "F");
      doc.setFont("helvetica", "normal");
      doc.setFontSize(7);
      doc.setTextColor(...W);
      doc.text("CHU Abomey-Calavi/SO-AVA — Service Pédiatrie — Document confidentiel", 14, pageH - 4);
      doc.text("Page 1 / 1", pageW - 14, pageH - 4, { align: "right" });

      doc.save("compte_rendu_" + (dateVal || "garde") + ".pdf");
    }
